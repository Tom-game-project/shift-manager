<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shift Manager</title>
  </head>
  <body>
    <nav class="app-header">
      <div class="header-left">
        <h1 class="app-title">
          <span style="font-size: 1.2em; vertical-align: middle;">📅</span> Shift Manager
        </h1>
        
        <div class="plan-selector">
          <select id="plan-select" class="form-select">
            <option value="" disabled selected>Select Plan...</option>
          </select>
          <button id="create-plan-btn" class="btn btn-sm btn-outline-light" style="border-radius: 50%; width: 28px; height: 28px; padding: 0; display: inline-flex; align-items: center; justify-content: center;" title="Create New Plan">+</button>
        </div>
      </div>

      <div class="view-switcher">
        <button class="view-btn active" id="switch-viewer">Viewer</button>
        <button class="view-btn" id="switch-config">Config</button>
      </div>
    </nav>

    <main class="main-viewport">
      
      <!-- VIEW: CALENDAR -->
      <div id="view-calendar" class="view-section active-view">
        <div class="container">
          
          <div class="glass-panel calendar-controls-bar">
            <div class="nav-controls">
              <button class="btn btn-outline" id="prev-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                Prev
              </button>
              <span class="month-label" id="current-month-label">Analyzing...</span>
              <button class="btn btn-outline" id="next-btn">
                Next
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
              </button>
            </div>

            <div class="action-controls">
              <button id="generate-btn" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                Generate & Save
              </button>
              <button id="reset-btn" class="btn btn-danger btn-sm">
                 Reset Future
              </button>
            </div>
            
            <div class="file-controls">
              <input type="file" id="calendar-file-input" accept=".json" style="display: none;">
              <button id="import-calendar-btn" class="btn btn-outline-light btn-sm" title="Import Calendar Data" style="color:var(--text-main); border-color:#cbd5e1;">📂 Import</button>
              <button id="export-calendar-btn" class="btn btn-outline-light btn-sm" title="Export Calendar Data" style="color:var(--text-main); border-color:#cbd5e1;">💾 Export</button>
            </div>
          </div>

          <div class="glass-panel calendar-grid-container" style="padding: 0; overflow: hidden;">
            <div class="calendar-header-row">
              <div class="cal-header-cell status-col">State</div>
              <div class="cal-header-cell">Mon</div>
              <div class="cal-header-cell">Tue</div>
              <div class="cal-header-cell">Wed</div>
              <div class="cal-header-cell">Thu</div>
              <div class="cal-header-cell">Fri</div>
              <div class="cal-header-cell">Sat</div>
              <div class="cal-header-cell">Sun</div>
            </div>
            <div id="calendar-mount" class="calendar-grid">
              <!-- Grid Rows will be injected here -->
            </div>
          </div>
        </div>
      </div>

      <!-- VIEW: CONFIG -->
      <div id="view-config" class="view-section">
        <div class="container config-container">
          
          <section class="glass-panel config-section" style="padding: 20px;">
            <div class="section-header">
              <h2>👥 Staff Groups</h2>
              <button id="add-group-btn" class="btn btn-primary btn-sm">+ Add Group</button>
            </div>
            <div id="staff-groups-container" class="card-list">
              <!-- Staff Groups injected here -->
            </div>
          </section>

          <section class="glass-panel config-section" style="padding: 20px;">
            <div class="section-header">
              <h2>⚙️ Weekly Rules</h2>
              <button id="add-rule-btn" class="btn btn-primary btn-sm">+ Add Rule</button>
            </div>
            <div id="rules-container" class="card-list">
              <!-- Rules injected here -->
            </div>
          </section>

          <section class="glass-panel config-section" style="padding: 20px;">
            <div class="section-header">
              <h2>💾 Config Data (JSON)</h2>
              <div>
                <input type="file" id="config-file-input" accept=".json" style="display: none;">
                <button id="import-json-btn" class="btn btn-outline btn-sm">Load</button>
                <button id="download-json-btn" class="btn btn-outline btn-sm">Save</button>
              </div>
            </div>
            <pre id="json-output" class="json-preview"></pre>
          </section>

        </div>
      </div>

    </main>

    <!-- Modal for Assignment / Generic use -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <h3 id="modal-title" style="margin-top:0; margin-bottom:1rem; border-bottom:1px solid #eee; padding-bottom:10px;">Edit</h3>
        <div id="modal-body" style="max-height: 400px; overflow-y: auto;">
          <!-- Content injected here -->
        </div>
        <footer>
          <button id="modal-cancel-btn" class="btn btn-outline">Cancel</button>
        </footer>
      </div>
    </div>

    <!-- Script -->
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
